name: Project checks

on:
  push:
    branches:
      - feat/ci-test-pipeline
  pull_request:
    branches:
      - develop
      - master

jobs:
  project-checks:
    name: Run project checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: localdevsecret
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create test environment file
        run: |
          cat > .env << 'EOF'
          NODE_ENV=test
          PORT=3000
          BASE_URL=http://localhost:3000
          DB_HOST=localhost
          DB_PORT=5432
          DB_USERNAME=postgres
          DB_PASSWORD=localdevsecret
          DB_NAME=postgres
          EOF

      - name: Check formatting
        run: npm run format:check

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test:project-checks

      - name: Run build
        run: npm run build
