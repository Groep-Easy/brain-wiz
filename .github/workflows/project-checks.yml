name: Project checks

on:
  push:
    branches:
      - feat/ci-test-pipeline
  pull_request:
    branches:
      - develop
      - master

jobs:
  format-check:
    name: Check formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

  lint:
    name: Run lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  tests:
    name: Run tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: localdevsecret
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create test environment file
        run: |
          cat > .env << 'EOF'
          PORT=3000
          NODE_ENV=test
          BASE_URL=http://localhost:3000
          ADMIN_API_KEY=dev-secret-key
          CORS_ORIGINS=http://localhost:5173,http://localhost:5174

          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=localdevsecret
          POSTGRES_DB=postgres

          DB_HOST=127.0.0.1
          DB_PORT=5432
          DB_USERNAME=postgres
          DB_PASSWORD=localdevsecret
          DB_NAME=postgres
          DB_SSL=false

          DB_SYNCHRONIZE=true
          DB_DROP_SCHEMA=false

          DB_POOL_MIN=3
          DB_POOL_MAX=10
          DB_QUERY_TIMEOUT=30000
          DB_IDLE_TIMEOUT=900000
          DB_LOG_LEVEL=error
          DB_LOGGING_ENABLED=false
          EOF

      - name: Run tests
        run: npm run test:project-checks

  build:
    name: Run build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build
