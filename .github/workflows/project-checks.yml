name: Project checks

on:
  pull_request:
    branches:
      - develop
      - master
  push:
    branches:
      - develop
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 22

concurrency:
  group: project-checks-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  format-check:
    name: Check formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Check formatting
        run: npm run format:check

  lint:
    name: Run lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Run lint
        run: npm run lint

  tests:
    name: Run tests
    uses: ./.github/workflows/database-runner.yml
    with:
      job-name: Run tests
      node-version: '22'
      run-command: npm run test:project-checks
      upload-coverage: false

  coverage:
    name: Generate coverage report
    needs: tests
    uses: ./.github/workflows/database-runner.yml
    with:
      job-name: Generate coverage report
      node-version: '22'
      run-command: npm run test:coverage
      upload-coverage: true

  build:
    name: Run build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Run build
        run: npm run build
