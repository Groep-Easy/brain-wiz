name: Database runner

on:
  workflow_call:
    inputs:
      job-name:
        description: Display name for the database-runner job
        required: true
        type: string
      node-version:
        description: Node.js version used by the job
        required: false
        type: string
        default: '22'
      run-command:
        description: npm command to run after the database and environment are ready
        required: true
        type: string
      upload-coverage:
        description: Upload LCOV and HTML coverage reports
        required: false
        type: boolean
        default: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  database-runner-check:
    name: ${{ inputs.job-name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: ci_test_postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d ci_test_postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Create .env
        run: cp .env.test .env

      - name: Install coverage report tooling
        if: ${{ inputs.upload-coverage }}
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov

      - name: Run database-runner command
        run: ${{ inputs.run-command }}

      - name: Generate HTML coverage report
        if: ${{ inputs.upload-coverage }}
        run: |
          cd dist
          genhtml ../coverage/lcov.info --output-directory ../coverage/html

      - name: Upload LCOV coverage report
        if: ${{ inputs.upload-coverage }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov-report
          path: coverage/lcov.info
          if-no-files-found: error

      - name: Upload HTML coverage report
        if: ${{ inputs.upload-coverage }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: coverage/html
          if-no-files-found: error
