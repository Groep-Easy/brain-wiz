name: Database runner

on:
  workflow_call:
    inputs:
      job-name:
        description: Display name for the database-runner job
        required: true
        type: string
      node-version:
        description: Node.js version used by the job
        required: false
        type: string
        default: '22'
      run-command:
        description: npm command to run after the database and environment are ready
        required: true
        type: string
      upload-coverage:
        description: Upload LCOV and HTML coverage reports
        required: false
        type: boolean
        default: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  database-runner-check:
    name: ${{ inputs.job-name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      PORT: 3000
      NODE_ENV: test
      BASE_URL: http://localhost:3000
      ADMIN_API_KEY: ci-test-key
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174

      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ci_test_password
      POSTGRES_DB: ci_test_postgres

      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: ci_test_password
      DB_NAME: ci_test_postgres
      DB_SSL: 'false'

      DB_SYNCHRONIZE: 'true'
      DB_DROP_SCHEMA: 'false'

      DB_POOL_MIN: 1
      DB_POOL_MAX: 5
      DB_QUERY_TIMEOUT: 30000
      DB_IDLE_TIMEOUT: 900000
      DB_LOG_LEVEL: error
      DB_LOGGING_ENABLED: 'false'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: ci_test_postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d ci_test_postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Create CI environment file
        run: |
          cat > .env << EOF
          PORT=${PORT}
          NODE_ENV=${NODE_ENV}
          BASE_URL=${BASE_URL}
          ADMIN_API_KEY=${ADMIN_API_KEY}
          CORS_ORIGINS=${CORS_ORIGINS}

          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}

          DB_HOST=${DB_HOST}
          DB_PORT=${DB_PORT}
          DB_USERNAME=${DB_USERNAME}
          DB_PASSWORD=${DB_PASSWORD}
          DB_NAME=${DB_NAME}
          DB_SSL=${DB_SSL}

          DB_SYNCHRONIZE=${DB_SYNCHRONIZE}
          DB_DROP_SCHEMA=${DB_DROP_SCHEMA}

          DB_POOL_MIN=${DB_POOL_MIN}
          DB_POOL_MAX=${DB_POOL_MAX}
          DB_QUERY_TIMEOUT=${DB_QUERY_TIMEOUT}
          DB_IDLE_TIMEOUT=${DB_IDLE_TIMEOUT}
          DB_LOG_LEVEL=${DB_LOG_LEVEL}
          DB_LOGGING_ENABLED=${DB_LOGGING_ENABLED}
          EOF

      - name: Install coverage report tooling
        if: ${{ inputs.upload-coverage }}
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov

      - name: Run database-runner command
        run: ${{ inputs.run-command }}

      - name: Generate HTML coverage report
        if: ${{ inputs.upload-coverage }}
        run: |
          cd dist
          genhtml ../coverage/lcov.info --output-directory ../coverage/html

      - name: Upload LCOV coverage report
        if: ${{ inputs.upload-coverage }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov-report
          path: coverage/lcov.info
          if-no-files-found: error

      - name: Upload HTML coverage report
        if: ${{ inputs.upload-coverage }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: coverage/html
          if-no-files-found: error
