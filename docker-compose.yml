services:
  brain-wiz:
    build: .
    env_file:
      - .env
    environment:
      - DB_HOST=db
    ports:
      - '3000:3000'
    container_name: server
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: postgres-db
    env_file:
      - .env
    # Expose Postgres on the host via 5433 to avoid conflicts with any local
    # Postgres instance on 5432. The app and tests use DB_PORT=5433 in .env.
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
      image: dpage/pgadmin4
      container_name: pgadmin
      ports:
        - "5050:80"
      environment:
        PGADMIN_DEFAULT_EMAIL: admin@brainwis.com
        PGADMIN_DEFAULT_PASSWORD: brainwis
        PGADMIN_CONFIG_SERVER_MODE: 'False'
        PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
        PGADMIN_CONFIG_LOGIN_DISABLED: 'True'

      user: root
      depends_on:
        - db
      restart: unless-stopped

volumes:
  postgres_data:


