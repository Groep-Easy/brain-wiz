services:
  brain-wiz:
    build: .
    container_name: brain-wiz
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_SYNCHRONIZE: "false"
      DB_DROP_SCHEMA: "false"
      TRUST_PROXY: "true"
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  nginx:
    image: nginxinc/nginx-unprivileged:alpine
    container_name: nginx-proxy
    ports:
      - '80:8080'
      - '443:8443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/errors:/usr/share/nginx/html/errors:ro
    depends_on:
      - brain-wiz
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: postgres-db
    user: '999:999'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in your env}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in your env}
    secrets:
      - postgres_password
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    profiles: [tools]
    ports:
      - '127.0.0.1:5050:5050'
    env_file:
      - .env
    environment:
      PGADMIN_LISTEN_PORT: '5050'
    depends_on:
      - db
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  loki:
    image: grafana/loki:3.5.0
    container_name: loki
    profiles: [observability]
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3100/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.5.0
    container_name: promtail
    profiles: [observability]
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./loki/promtail-config.yml:/etc/promtail/config.yml:ro
    depends_on:
      loki:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.0.1
    container_name: grafana
    profiles: [observability]
    ports:
      - '127.0.0.1:3200:3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?set GRAFANA_ADMIN_USER in your env}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_SECURITY_ADMIN_EMAIL: ${GRAFANA_ADMIN_EMAIL:-admin@brainwiz.local}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    secrets:
      - grafana_admin_password
    volumes:
      - ./loki/grafana-provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

secrets:
  postgres_password:
    environment: POSTGRES_PASSWORD
  grafana_admin_password:
    environment: GRAFANA_ADMIN_PASSWORD

volumes:
  postgres_data:
  loki_data:
