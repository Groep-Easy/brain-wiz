# docker-compose.dev.yml
services:
  # ---------------------------------------------------------------------------
  # Brain Wiz
  # ---------------------------------------------------------------------------
  brain-wiz:
    build: .
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    container_name: server
    ports:
      - '3000:3000'
    depends_on:
      - db
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16
    container_name: postgres-db
    env_file:
      - .env
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
