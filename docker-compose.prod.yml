# docker-compose.prod.yml
services:
  # ---------------------------------------------------------------------------
  # Brain Wiz
  # ---------------------------------------------------------------------------
  brain-wiz:
    build: .
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    container_name: server
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Nginx
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/errors:/usr/share/nginx/html/errors:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - brain-wiz
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 10
    container_name: postgres-db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Observability: Loki + Promtail + Grafana
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.5.0
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3100/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Promtail
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.5.0
    container_name: promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./loki/promtail-config.yml:/etc/promtail/config.yml:ro
      - nginx_logs:/var/log/nginx:ro
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:12.0.1
    container_name: grafana
    ports:
      - '3200:3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD?Error GRAFANA_ADMIN_PASSWORD is required}
      GF_SECURITY_ADMIN_EMAIL: ${GRAFANA_ADMIN_EMAIL?Error GRAFANA_ADMIN_EMAIL is required}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./loki/grafana-provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  loki_data:
  grafana_data:
  nginx_logs: # Shared log volume: nginx writes here, Promtail reads from the same path.
