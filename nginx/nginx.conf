# =============================================================================
# Hardened nginx configuration template
# =============================================================================

# Use all available CPU cores. Never leave this as the default (1).
worker_processes auto;

# Raise the file descriptor limit to match worker_connections * worker_processes.
# Ensure /etc/security/limits.conf (or equivalent) allows this on the host.
worker_rlimit_nofile 65535;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;   # Linux only; remove on BSD/macOS
}

http {
    # -------------------------------------------------------------------------
    # Basics
    # -------------------------------------------------------------------------
    include      mime.types;
    default_type application/octet-stream;

    # Never advertise the nginx version in headers or error pages.
    server_tokens off;

    # Efficient file sending (disable for dynamic/proxied content if needed).
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    types_hash_max_size    2048;
    types_hash_bucket_size 64;

    # -------------------------------------------------------------------------
    # TLS global settings
    # TODO: Replace cert/key paths with your actual certificate paths.
    #       Consider using certbot/ACME for automated renewal.
    # -------------------------------------------------------------------------
    ssl_certificate      /etc/nginx/ssl/nginx-selfsigned.crt;
    ssl_certificate_key  /etc/nginx/ssl/nginx-selfsigned.key;
    ssl_session_cache    shared:SSL:10m;
    ssl_session_timeout  1d;
    ssl_session_tickets  off;

    # Modern TLS only — drops IE11 and very old Android. Adjust if you need
    # broader compatibility.
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # OCSP stapling — only valid with certs from a recognised CA.
    # Self-signed certificates have no OCSP responder, so this MUST stay off
    # or Nginx will log errors and may fail cert validation entirely.
    # Re-enable when you switch to Let's Encrypt or a proper CA cert.
    ssl_stapling        off;
    ssl_stapling_verify off;
    # resolver            1.1.1.1 8.8.8.8 valid=300s;
    # resolver_timeout    5s;

    # -------------------------------------------------------------------------
    # Timeouts — explicit everywhere; never rely on nginx defaults
    # -------------------------------------------------------------------------
    client_body_timeout    10s;
    client_header_timeout  10s;
    keepalive_timeout      15s;
    send_timeout           10s;
    proxy_connect_timeout   5s;
    proxy_send_timeout     30s;
    proxy_read_timeout     30s;

    # -------------------------------------------------------------------------
    # Request size limits
    # TODO: Tune to the largest legitimate payload your app actually needs.
    # -------------------------------------------------------------------------
    client_max_body_size       1m;
    large_client_header_buffers 4 8k;

    # -------------------------------------------------------------------------
    # Rate limiting zones
    # -------------------------------------------------------------------------

    # General zone — applied globally to all routes.
    limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=10r/s;

    # Strict zone — apply to auth/login endpoints to prevent brute-force.
    limit_req_zone $binary_remote_addr zone=auth_limit:10m  rate=2r/m;

    # Connection count zone — guards against slow-loris / connection floods.
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Return correct HTTP semantics on limit hits (default is 503).
    limit_req_status  429;
    limit_conn_status 429;

    # -------------------------------------------------------------------------
    # Trusted upstream proxies for X-Forwarded-For stripping
    # TODO: Replace with the real IPs/ranges of any load balancers or CDN
    #       nodes that sit in front of this nginx instance.
    #       If nothing sits in front, remove the set_real_ip_from lines and
    #       keep only "proxy_set_header X-Forwarded-For $remote_addr;" below.
    # -------------------------------------------------------------------------
    # set_real_ip_from  10.0.0.0/8;
    # set_real_ip_from  172.16.0.0/12;
    # real_ip_header    X-Forwarded-For;
    # real_ip_recursive on;

    # -------------------------------------------------------------------------
    # WebSocket upgrade map
    # -------------------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # -------------------------------------------------------------------------
    # Upstream block — makes it easy to add replicas, health checks, and
    # keepalive connections to the backend later.
    # TODO: Add more "server" lines here for horizontal scaling.
    # -------------------------------------------------------------------------
    upstream brain_wiz {
        server brain-wiz:3000;

        # Reuse backend connections instead of opening a new TCP connection
        # per request. 32 is a sensible starting point; tune to your traffic.
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # Main application server
    # -------------------------------------------------------------------------
    server {
        listen      3000 ssl default_server;
        listen      [::]:3000 ssl default_server;
        server_name _;

        # -- Global rate & connection limits for this vhost ------------------
        limit_req  zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 20;

        # -- Security headers ------------------------------------------------
        # HSTS: tells browsers to only connect over HTTPS for 1 year.
        # Only enable includeSubDomains / preload once you're sure ALL
        # subdomains also serve HTTPS.
        add_header Strict-Transport-Security "max-age=31536000" always;

        # Prevent MIME-type sniffing.
        add_header X-Content-Type-Options "nosniff" always;

        # Deny embedding in iframes — change to SAMEORIGIN if you need it.
        add_header X-Frame-Options "DENY" always;

        # Minimal referrer information sent cross-origin.
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # TODO: Tighten CSP to match your app's actual sources.
        #       The value below is intentionally restrictive; relax only what
        #       your frontend actually needs.
        # add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self' wss:; frame-ancestors 'none';" always;

        # Disable browser features your app doesn't use.
        # TODO: Remove entries for any APIs your app legitimately needs
        #       (e.g. camera=(), microphone=() if you have a video feature).
        # add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

        # -- Strip upstream information-leaking headers ----------------------
        proxy_hide_header X-Powered-By;
        proxy_hide_header X-AspNet-Version;
        proxy_hide_header X-AspNetMvc-Version;

        # -- Custom error pages (prevents nginx version leaking in defaults) -
        # TODO: Create these static HTML files and place them at the paths below.
        error_page 400 /errors/400.html;
        error_page 401 /errors/401.html;
        error_page 403 /errors/403.html;
        error_page 404 /errors/404.html;
        error_page 429 /errors/429.html;
        error_page 500 502 503 504 /errors/50x.html;

        location ^~ /errors/ {
            internal;
            # TODO: Point to a directory containing your custom error pages.
            root /usr/share/nginx/html;
        }

        # -- Auth / login — strict rate limiting -----------------------------
        # TODO: Adjust the path pattern to match your actual auth endpoints.
        location ~* ^/(login|auth|api/auth|api/token) {
            limit_req  zone=auth_limit burst=5 nodelay;
            limit_conn conn_limit 10;

            proxy_pass            http://brain_wiz;
            proxy_http_version    1.1;
            proxy_set_header      Connection "";          # Disable keep-alive headers for HTTP/1.1 upstream
            proxy_set_header      Host              $host;
            # Replace, not append, to prevent spoofed XFF chains.
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $remote_addr;
            proxy_set_header      X-Forwarded-Proto $scheme;

            # No WebSocket needed on auth endpoints.
            proxy_set_header Upgrade    "";
            proxy_set_header Connection "close";
        }

        # -- Main proxy / WebSocket location ---------------------------------
        location / {
            proxy_pass         http://brain_wiz;
            proxy_http_version 1.1;

            # WebSocket support
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Standard forwarding headers — replace, never append.
            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable buffering for WebSocket / SSE / streaming responses.
            # Set to "on" (and remove proxy_buffering lines) for regular
            # request/response APIs if you want nginx to buffer upstream replies.
            proxy_buffering    off;
            proxy_cache_bypass $http_upgrade;

            # Override read timeout for long-lived WebSocket connections.
            proxy_read_timeout 3600s;
        }
    }
}
